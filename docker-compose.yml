version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: agente-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: agente-ventas
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - agente-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend Express + LangGraph ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agente-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: mongodb://mongo:27017/agente-ventas
      # ⚠️  Completar con valores reales (o usar archivo .env):
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FRONTEND_URL: ${FRONTEND_URL:-https://agente-ventas.vercel.app}
      ADMIN_KEY: ${ADMIN_KEY:-cambia_esta_clave}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - agente-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
    driver: local

networks:
  agente-network:
    driver: bridge
